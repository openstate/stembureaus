{% extends "embed.html" %}

{% block content %}
  <div class="container-fluid">
    {% include "show_alles.html" %}
    {% include "search_gemeenten.html" %}
  </div>
{% endblock %}

{% block scripts %}
  {{ super() }}
  {% include "map_scripts.html" %}
  <script>
    StembureausApp.homepage = true;
  </script>

  <script>
    $(function () {
      $('[data-bs-toggle="tooltip"]').tooltip();
      setTimeout(
        function() {$('[data-bs-toggle="popover"]').popover()},
        1
      );
    })

    /* methode om popovers te verbergen wanneer ergens geklikt wordt. */
    $('body').on('click', function (e) {
      $('[data-bs-toggle=popover]').each(function () {
        if (!$(this).is(e.target) && $(this).has(e.target).length === 0 && $('.popover').has(e.target).length === 0) {
          (($(this).popover('hide').data('bs.popover') || {}).inState || {}).click = false;
        }
      });
    });
  </script>
{% endblock %}
